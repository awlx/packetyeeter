global
    log stdout format raw local0
    lua-load examples/ja4h.lua
    lua-load examples/ja4.lua

defaults
    log     global
    mode    http
    option  httplog
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# ---------------------------------------------------------------------
# Backend for the SPOE Agent (PacketYeeter)
# ---------------------------------------------------------------------
backend spoe-packetyeeter
    mode tcp
    balance roundrobin
    timeout connect 1s
    timeout server  5s
    server packetyeeter 127.0.0.1:9000 check inter 2s rise 2 fall 1

# ---------------------------------------------------------------------
# Frontend
# ---------------------------------------------------------------------
frontend http_front
    bind *:80
    
    # Capture timestamp when the TCP connection is accepted (Handshake complete)
    # This acts as our "T0" to calculate how long the client waits before sending data
    tcp-request connection set-var(sess.start_us) date_us

    # Compute JA4 TLS fingerprint (Lua)
    tcp-request content lua.fingerprint_ja4
    # Compute JA4H fingerprint (Lua)
    http-request lua.fingerprint_ja4h

    # Capture timestamp when request headers are fully received ("T1")
    http-request set-var(txn.req_us) date_us

    # Capture destination IP and port (the server/service being accessed)
    http-request set-var(txn.dst_ip) dst
    http-request set-var(txn.dst_port) dst_port
    

    # Capture HTTP features for SPOE
    http-request set-var(txn.method) method
    http-request set-var(txn.path) path
    http-request set-var(txn.host) req.fhdr(host),field(1,::)
    http-request set-var(txn.ua) req.fhdr(user-agent),field(1,::)
    http-request set-var(txn.accept) req.fhdr(accept),field(1,::)
    http-request set-var(txn.accept_language) req.fhdr(accept-language),field(1,::)
    http-request set-var(txn.accept_encoding) req.fhdr(accept-encoding),field(1,::)
    http-request set-var(txn.referer) req.fhdr(referer),field(1,::)
    http-request set-var(txn.has_cookies) req.hdr_cnt(Cookie)

    # Sec-Fetch-* are set automatically by real browsers on navigations/
    # fetches and are effectively impossible for a basic bot/script to fake
    # correctly (unlike User-Agent). Empty when absent, which is itself a
    # useful signal for a UA claiming to be a modern browser.
    http-request set-var(txn.sec_fetch_site) req.fhdr(sec-fetch-site)
    http-request set-var(txn.sec_fetch_mode) req.fhdr(sec-fetch-mode)
    http-request set-var(txn.sec_fetch_dest) req.fhdr(sec-fetch-dest)
    http-request set-var(txn.sec_fetch_user) req.fhdr(sec-fetch-user)

    # Negotiated TLS version/cipher (only meaningful behind a TLS-terminating
    # frontend); an outdated protocol/cipher paired with a modern-browser UA
    # claim is a strong mismatch signal.
    http-request set-var(txn.tls_version) ssl_fc_protocol if { ssl_fc }
    http-request set-var(txn.tls_cipher) ssl_fc_cipher if { ssl_fc }

    # Number of HTTP requests already served on this connection (keep-alive
    # reuse). Real browsers reuse connections heavily; many scripted/
    # single-shot clients do not.
    http-request set-var(txn.conn_request_count) fc_http_req_cnt

    # Enable the SPOE Agent
    filter spoe engine packet-yeeter-agent config examples/packetyeeter.spoe.conf on-error ignore on-timeout ignore

    default_backend http_back

backend http_back
    server s1 127.0.0.1:8080
