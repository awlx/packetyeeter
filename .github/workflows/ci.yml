name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-libc-dev

      - name: Install protobuf tools
        run: make install-buf

      - name: Generate protobuf
        run: make proto

      - name: Run portable tests
        run: make portable-test

      - name: Run portable tests with race detector
        run: go test -race ./pkg/analyzer/... ./pkg/ml/... ./pkg/integration_test ./pkg/collector ./cmd/yeetctl

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Vulnerability scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.5.0
          govulncheck ./...

      - name: Build analyzer
        run: make analyzer

      - name: Build collector
        run: make collector

      - name: Build Docker image
        run: docker build .

  e2e-haproxy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install haproxy
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends haproxy

      - name: Install protobuf tools
        run: make install-buf

      - name: Run HAProxy peer/SPOE protocol e2e tests
        run: make e2e-test

  e2e-ebpf:
    runs-on: ubuntu-latest
    # Validated on a real Linux host with root + BPF support as part of
    # this change. Kept as a separate, best-effort job (continue-on-error)
    # since GitHub-hosted runner kernels/permissions can vary; a failure
    # here should not block the rest of CI, but should be investigated.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-libc-dev iproute2

      - name: Install protobuf tools
        run: make install-buf

      - name: Run kernel eBPF/XDP block-enforcement e2e test
        run: make e2e-ebpf-test
