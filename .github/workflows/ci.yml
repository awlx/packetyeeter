name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang llvm libbpf-dev linux-libc-dev

      - name: Install protobuf tools
        run: make install-buf

      - name: Generate protobuf
        run: make proto

      - name: Run portable tests
        run: make portable-test

      - name: Build analyzer
        run: make analyzer

      - name: Build collector
        run: make collector

      - name: Build Docker image
        run: docker build .
